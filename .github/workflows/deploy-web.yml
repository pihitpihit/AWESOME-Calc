name: Web reference (build + deploy to Pages)

on:
  # PR: 빌드만 (CI 스모크 테스트). PR 화면에 체크로 노출된다.
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "data/**"
      - ".github/workflows/deploy-web.yml"
  # main 푸시: 빌드 + Pages 배포
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/**"
      - ".github/workflows/deploy-web.yml"
  # 수동 실행
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Pages 배포용 아티팩트는 main 푸시·수동 실행 때만 만든다.
      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
